services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    command:
      - "bash"
      - "-lc"
      - "/etc/confluent/docker/configure && echo '4lw.commands.whitelist=ruok,stat' >> /etc/kafka/zookeeper.properties && /etc/confluent/docker/ensure && /etc/confluent/docker/launch"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,stat"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9999:9999"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Listen on PLAINTEXT (internal) and SASL_PLAINTEXT (tenant clients)
      KAFKA_LISTENERS: SASL_PLAINTEXT://0.0.0.0:9093,PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9093,PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTHORIZER_CLASS_NAME: kafka.security.authorizer.AclAuthorizer
      # Broker super users (admin and anonymous internal controller traffic)
      KAFKA_SUPER_USERS: User:admin;User:ANONYMOUS
      KAFKA_ZOOKEEPER_SASL_ENABLED: "false"
      ZOOKEEPER_SASL_ENABLED: "false"
      KAFKA_ZOOKEEPER_SET_ACL: "false"
      # Single-broker cluster settings for internal topics and offsets
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Enable SASL (SCRAM) for client authentication on SASL_PLAINTEXT listener
      KAFKA_SASL_ENABLED_MECHANISMS: SCRAM-SHA-256,SCRAM-SHA-512
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/secrets/kafka_server_jaas.conf"
      # JMX configuration
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka
      KAFKA_JMX_OPTS: "-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.rmi.port=9999"
      # Reduce JVM heap to avoid OOM on low-memory hosts
      KAFKA_HEAP_OPTS: "-Xms128m -Xmx512m"
      # Debug logging
      KAFKA_LOG4J_LOGGERS: "kafka.server.ClientQuotaManager=DEBUG,kafka.request.logger=INFO"
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 9092 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./secrets:/etc/kafka/secrets:ro
      

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9093"
      KAFKA_INTERNAL_SERVER: "kafka:9093"
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_USE_SSL: "false"
      SYSTEM_USER: "gateway-system"
      SYSTEM_PASSWORD: "gateway-system-password"
      ADMIN_USER: "admin"
      ADMIN_PASSWORD: "admin-password"
      ARCHIVE_INTERVAL_MS: 300000 # 5 minutes default archival interval
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  kafka-network:
    driver: bridge

volumes:
  kafka-data:
